<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Go Buznes | Le commerce connecté à Goma</title>
    <meta name="description" content="Trouvez les meilleures boutiques et articles à Goma. Mode, Électronique, Services et bien plus.">
    
    <meta property="og:title" content="Go Buznes | Goma">
    <meta property="og:description" content="Découvrez les boutiques locales et commandez directement sur WhatsApp.">
    <meta property="og:image" content="https://gogamenetiqui.github.io/Go-Buznes/netiqui_logo.png"> 
    <meta property="og:url" content="https://gogamenetiqui.github.io/Go-Buznes/">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Go Buznes | Goma">
    <meta name="twitter:description" content="Le pont entre les vendeurs de Goma et leurs clients.">
    <meta name="twitter:image" content="https://gogamenetiqui.github.io/Go-Buznes/netiqui_logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* STYLE DU SPLASH SCREEN INTÉGRÉ */
        #splash-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #05070a;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; /* Toujours au dessus */
            transition: opacity 0.8s ease, visibility 0.8s;
            font-family: 'Montserrat', sans-serif;
        }

        .loader-ring {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 2px solid #d4af37;
            margin: 0 auto 40px;
            animation: spin 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .brand-splash h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 200;
            letter-spacing: 8px;
            text-align: center;
            text-transform: uppercase;
        }

        .brand-splash h1 span { font-weight: 700; color: #d4af37; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Classe pour cacher le splash */
        .hide-splash {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div id="splash-overlay">
        <div style="text-align: center;">
            <div class="loader-ring"></div>
            <div class="brand-splash">
                <h1>GO <span>BUZNES</span></h1>
                <p style="color:rgba(255,255,255,0.5); font-size:10px; letter-spacing:3px; text-transform:uppercase; margin-top:10px;">Le commerce connecté • Goma</p>
            </div>
        </div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <i class="fa-solid fa-briefcase"></i>
                    <h1>Go <span>Buznes</span></h1>
                </div>
                <p id="total-articles-display">Chargement...</p>
            </div>

            <div class="header-stats">
                <div class="stat-main">
                    <span id="count-total">0</span>
                    <small>Vendeurs</small>
                </div>
                <div class="stat-details">
                    <div class="stat-item gold" title="Badges Or"><i class="fa-solid fa-crown"></i><span id="count-gold">0</span></div>
                    <div class="stat-item blue" title="Vérifiés"><i class="fa-solid fa-circle-check"></i><span id="count-blue">0</span></div>
                    <div class="stat-item neutral" title="Boutiques"><i class="fa-solid fa-shop"></i><span id="count-none">0</span></div>
                </div>
            </div>
        </header>

        <div class="search-container">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="main-search" placeholder="Rechercher à Goma...">
            </div>
        </div>

        <main class="app-content" id="main-render"></main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-page="home"><i class="fa-solid fa-house"></i><span>Accueil</span></a>
            <a href="#" class="nav-item" data-page="stores"><i class="fa-solid fa-store"></i><span>Boutiques</span></a>
            <a href="#" class="nav-item" data-page="vendre"><i class="fa-solid fa-rocket"></i><span>Vendre</span></a>
            <a href="#" class="nav-item" data-page="biens"><i class="fa-solid fa-boxes-stacked"></i><span>Biens</span></a>
            <a href="#" class="nav-item" data-page="profil"><i class="fa-regular fa-user"></i><span>Profil</span></a>
        </nav>
    </div>

    <script type="module">
        import { initialiserApp } from './app.js';
        
        // On attend que l'application soit prête avant de retirer le splash
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await initialiserApp();
                // Petit délai pour une transition fluide
                setTimeout(() => {
                    document.getElementById('splash-overlay').classList.add('hide-splash');
                }, 1500);
            } catch (error) {
                console.error("Erreur au chargement:", error);
                // En cas d'erreur, on retire quand même le splash pour ne pas bloquer l'utilisateur
                document.getElementById('splash-overlay').classList.add('hide-splash');
            }
        });
    </script>
    <script src="https://gogamenetiqui.github.io/serverapide/ads.js"></script>
</body>
</html>
