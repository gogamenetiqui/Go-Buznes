<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Buznes | Bienvenue</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --accent-color: #d4af37; /* Or doux, pas brillant */
            --text-secondary: rgba(255, 255, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* L'ANNEAU DE CONNEXION (Minimaliste) */
        .loader-ring {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 2px solid var(--accent-color);
            margin: 0 auto 40px;
            animation: spin 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            position: relative;
        }

        .loader-ring::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* LOGO TEXTUEL */
        .brand {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 1.5s 0.5s ease-out forwards;
        }

        .brand h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 200;
            letter-spacing: 10px;
            margin: 0;
            text-transform: uppercase;
        }

        .brand h1 span {
            font-weight: 700;
            color: var(--accent-color);
        }

        .brand p {
            color: var(--text-secondary);
            font-size: 10px;
            letter-spacing: 4px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* BARRE DE PROGRESSION DISCRÈTE */
        .progress-track {
            width: 150px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 30px auto 0;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            animation: fillProgress 4s ease-in-out forwards;
        }

        /* ANIMATIONS */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* SORTIE DOUCE */
        .exit-app {
            opacity: 0;
            filter: blur(5px);
            transition: all 0.8s ease-in-out;
        }

    </style>
</head>
<body>

<div class="container" id="splash-content">
    <div class="loader-ring"></div>

    <div class="brand">
        <h1>GO <span>BUZNES</span></h1>
        <p>Le commerce connecté • Goma</p>
    </div>

    <div class="progress-track">
        <div class="progress-fill"></div>
    </div>
</div>

<script>
    // Redirection vers l'index après 4.5 secondes
    setTimeout(() => {
        const content = document.getElementById('splash-content');
        content.classList.add('exit-app');

        setTimeout(() => {
            window.location.href = 'accueil.html';
        }, 800);
    }, 4500);
</script>
</body>
</html>
