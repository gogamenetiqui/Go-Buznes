<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Buznes</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="info_app.css">
    <link rel="manifest" href="./manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('🚀 Go Buznes PWA prête et active !'))
        .catch(err => console.log('⚠️ Échec de configuration PWA :', err));
    });
  }
</script>
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="header-left">
                <div class="logo-area">
                    <i class="fa-solid fa-bag-shopping brand-icon"></i>
                    <h1>Go <span>Buznes</span></h1>
                </div>
                <p id="total-articles-display">Chargement des vitrines...</p>
            </div>

            <div class="header-stats">
                <div class="stat-badge total" title="Total Boutiques">
                    <span id="count-total">0</span>
                    <small>Boutiques</small>
                </div>
                <div class="stat-sub-group">
                    <div class="stat-mini gold" title="Partenaires Or">
                        <i class="fa-solid fa-crown"></i>
                        <span id="count-gold">0</span>
                    </div>
                    <div class="stat-mini blue" title="Vendeurs Vérifiés">
                        <i class="fa-solid fa-circle-check"></i>
                        <span id="count-blue">0</span>
                    </div>
                    <div class="stat-mini standard" title="Boutiques Standards">
                        <i class="fa-solid fa-store"></i>
                        <span id="count-none">0</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="search-wrapper" style="display: flex; align-items: center; gap: 8px;">
            <div class="search-bar-box" style="flex: 1;">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="main-search" placeholder="Rechercher un produit, une boutique à Goma...">
            </div>
            <button id="btn-info-app" title="À propos de l'application">
                <i class="fa-solid fa-circle-info"></i>
            </button>
        </div>

        <main class="app-content" id="main-render">
        </main>

        <nav class="bottom-navigation">
            <button class="nav-tab active" data-page="home">
                <i class="fa-solid fa-house"></i>
                <span>Accueil</span>
            </button>
            <button class="nav-tab" data-page="stores">
                <i class="fa-solid fa-store"></i>
                <span>Boutiques</span>
            </button>
            <button class="nav-tab" data-page="vendre">
                <i class="fa-solid fa-circle-plus"></i>
                <span>Vendre</span>
            </button>
            <button class="nav-tab" data-page="biens">
                <i class="fa-solid fa-box-open"></i>
                <span>Biens</span>
            </button>
            <button class="nav-tab" data-page="profil">
                <i class="fa-regular fa-user"></i>
                <span>Profil</span>
            </button>
        </nav>

    </div>

    <script type="module" src="app.js"></script>
    <script src="info_app.js"></script>
</body>
</html>
