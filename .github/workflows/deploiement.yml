name: Synchronisation Miroir Public

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère le code du dépôt privé
      - name: Recupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour éviter les erreurs de push shallow

      # 2. Configure la clé SSH de manière sécurisée
      - name: Configurer la clé SSH de destination
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RETO_MIROIR_CLE }}

      # 3. Déploie proprement et affiche l'erreur exacte en cas d'échec
      - name: Pousser le code vers le dépôt public
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          
          git config --global user.name "Netiqui Bot"
          git config --global user.email "bot@netiqui.com"
          
          # Nettoyage des télécommandes existantes au cas où
          git remote remove miroir || true
          git remote add miroir git@github.com:gogamenetiqui/Go-Buznes.git
          
          # Exécution avec affichage détaillé (verbose -v) pour voir le blocage exact
          GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new" git push miroir main --force -v
