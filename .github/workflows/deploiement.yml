name: Synchronisation Miroir Public

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère le code du dépôt privé
      - name: Recupérer le code source
        uses: actions/checkout@v4

      # 2. Configure la clé SSH de manière sécurisée
      - name: Configurer la clé SSH de destination
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RETO_MIROIR_CLE }}

      # 3. Déploie proprement vers le dépôt miroir public en évitant les blocages d'hôtes connus
      - name: Pousser le code vers le dépôt public
        run: |
          # Enregistrement préalable de l'empreinte de clé de GitHub pour éviter le blocage SSH
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          
          git config --global user.name "Netiqui Bot"
          git config --global user.email "bot@netiqui.com"
          
          # Ajout du dépôt miroir public
          git remote add miroir git@github.com:gogamenetiqui/Go-Buznes.git
          
          # Push forcé avec option SSH pour ignorer les invites interactives de vérification
          GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new" git push miroir main --force
