name: Production, Sécurisation et Synchronisation

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les outils de sécurité
        run: |
          npm init -y
          npm install javascript-obfuscator

      - name: ⚙️ Exécuter la génération et l'obfuscation
        run: |
          node obfuscate.js

      - name: 🗂 Générer automatiquement le sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # Page principale
          echo '<url><loc>https://gogamenetiqui.github.io/Go-Buznes/</loc><priority>1.0</priority></url>' >> sitemap.xml

          # Toutes les pages HTML générées
          for file in $(find . -name "*.html"); do
            clean_path=$(echo "${file#./}" | sed 's/ /%20/g')
            url="https://gogamenetiqui.github.io/Go-Buznes/$clean_path"
            echo "<url><loc>$url</loc><priority>0.8</priority></url>" >> sitemap.xml
          done

          # Toutes les images
          for img in $(find . -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.webp" -o -name "*.gif" \)); do
            clean_path=$(echo "${img#./}" | sed 's/ /%20/g')
            url="https://gogamenetiqui.github.io/Go-Buznes/$clean_path"
            echo "<url><loc>$url</loc><priority>0.5</priority></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: 🤖 Générer automatiquement le robots.txt
        run: |
          echo "User-agent: *" > robots.txt
          echo "Allow: /" >> robots.txt
          echo "Sitemap: https://gogamenetiqui.github.io/Go-Buznes/sitemap.xml" >> robots.txt

      - name: 📑 Générer automatiquement Schema.org JSON-LD
        run: |
          mkdir -p schema
          # Générer des fichiers JSON-LD pour chaque boutique
          for file in $(find Boutique -name "*.html"); do
            name=$(basename "$file" .html)
            cat <<EOF > schema/${name}.json
            {
              "@context": "https://schema.org",
              "@type": "Store",
              "name": "${name}",
              "url": "https://gogamenetiqui.github.io/Go-Buznes/$file",
              "image": "https://gogamenetiqui.github.io/Go-Buznes/images/${name}.jpg",
              "address": {
                "@type": "PostalAddress",
                "addressLocality": "Goma",
                "addressCountry": "CD"
              }
            }
EOF
          done

          # Générer des fichiers JSON-LD pour chaque article
          for file in $(find Article -name "*.html"); do
            name=$(basename "$file" .html)
            cat <<EOF > schema/${name}.json
            {
              "@context": "https://schema.org",
              "@type": "Product",
              "name": "${name}",
              "url": "https://gogamenetiqui.github.io/Go-Buznes/$file",
              "image": "https://gogamenetiqui.github.io/Go-Buznes/images/${name}.jpg",
              "offers": {
                "@type": "Offer",
                "url": "https://gogamenetiqui.github.io/Go-Buznes/$file",
                "priceCurrency": "USD",
                "price": "0.00",
                "availability": "https://schema.org/InStock"
              }
            }
EOF
          done

      - name: 🔑 Configurer la clé SSH de destination
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: "${{ secrets.REPO_MIROIR_CLE }}"

      - name: 🚀 Commit les modifications et pousser vers le dépôt public
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          
          git config --global user.name "Netiqui Bot Production"
          git config --global user.email "bot@netiqui.com"
          
          # On ajoute tous les dossiers virtuels (Article, Boutique), les fichiers JS modifiés, le sitemap, le robots.txt et les fichiers Schema.org
          git add -A
          
          git commit -m "Chiffrement + sitemap + robots.txt + schema.org [skip ci]" || echo "Aucune modification à commiter"
          
          git remote remove miroir || true
          git remote add miroir git@github.com:gogamenetiqui/Go-Buznes.git
          
          BRANCH_ACTUELLE=$(git branch --show-current)
          echo "🚀 Branche de déploiement détectée : $BRANCH_ACTUELLE"
          
          GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new" git push miroir $BRANCH_ACTUELLE:$BRANCH_ACTUELLE --force -v
