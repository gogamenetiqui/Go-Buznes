name: Production, Sécurisation et Synchronisation

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les outils de sécurité
        run: |
          npm ci --no-audit --no-fund || (npm init -y && npm install javascript-obfuscator)

      - name: ⚙️ Exécuter la génération et l'obfuscation
        run: |
          node obfuscate.js

      - name: 🗂 Générer automatiquement le sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # Page principale
          echo '<url><loc>https://gogamenetiqui.github.io/Go-Buznes/</loc><priority>1.0</priority></url>' >> sitemap.xml

          # Toutes les pages HTML générées
          for file in $(find . -name "*.html"); do
            url="https://gogamenetiqui.github.io/Go-Buznes/${file#./}"
            echo "<url><loc>$url</loc><priority>0.8</priority></url>" >> sitemap.xml
          done

          # Toutes les images
          for img in $(find . -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.webp" -o -name "*.gif" \)); do
            url="https://gogamenetiqui.github.io/Go-Buznes/${img#./}"
            echo "<url><loc>$url</loc><priority>0.5</priority></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: 🔑 Charger la clé SSH de destination
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: "${{ secrets.REPO_MIROIR_CLE }}"

      - name: 🚀 Pousser uniquement les artefacts (branche orphan)
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
        run: |
          set -euo pipefail

          # Détecter le répertoire d'artefacts
          if [ -d "dist" ]; then
            ARTIFACT_DIR="dist"
          elif [ -d "build" ]; then
            ARTIFACT_DIR="build"
          elif [ -d "obfuscated" ]; then
            ARTIFACT_DIR="obfuscated"
          else
            echo "Aucun répertoire d'artefacts trouvé (dist, build, obfuscated)." >&2
            ls -la
            exit 1
          fi

          echo "➡️ Artefacts détectés dans: $ARTIFACT_DIR"

          # Préparer un répertoire temporaire
          TMPDIR=$(mktemp -d)
          cp -R "${ARTIFACT_DIR}/." "$TMPDIR/"
          cp sitemap.xml "$TMPDIR/" || true

          cd "$TMPDIR"

          # Repo propre
          git init
          git config user.name "Netiqui Bot Production"
          git config user.email "bot@netiqui.com"

          MIRROR_REPO="git@github.com:gogamenetiqui/Go-Buznes.git"
          git remote add mirror "$MIRROR_REPO"

          git add .
          git commit -m "Deploy obfuscated build + sitemap [skip ci]" || echo "Aucune modification à commiter"

          echo "Pushing to $MIRROR_REPO (branch: main)"
          $GIT_SSH_COMMAND git push --force mirror HEAD:main -v

          cd -
          rm -rf "$TMPDIR" || true
