name: Génération Sitemap

on:
  push:
    branches:
      - main
      - master

jobs:
  build-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source privé
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🗂 Générer automatiquement le sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # Page principale
          echo '<url><loc>https://gogamenetiqui.github.io/Go-Buznes/</loc><priority>1.0</priority></url>' >> sitemap.xml

          # Toutes les pages HTML générées (dans le repo privé après obfuscation)
          for file in $(find . -name "*.html"); do
            url="https://gogamenetiqui.github.io/Go-Buznes/${file#./}"
            echo "<url><loc>$url</loc><priority>0.8</priority></url>" >> sitemap.xml
          done

          # Toutes les images (jpg, jpeg, png, webp, gif)
          for img in $(find . -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.webp" -o -name "*.gif" \)); do
            url="https://gogamenetiqui.github.io/Go-Buznes/${img#./}"
            echo "<url><loc>$url</loc><priority>0.5</priority></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: 🔑 Commit et pousser le sitemap dans le repo privé
        run: |
          git config --global user.name "Netiqui Bot Sitemap"
          git config --global user.email "bot@netiqui.com"
          
          git add sitemap.xml
          git commit -m "Mise à jour automatique du sitemap [skip ci]" || echo "Aucune modification à commiter"
          git push origin HEAD
