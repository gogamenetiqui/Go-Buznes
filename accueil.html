<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Buznes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Bouton flottant discret pour l'installation */
        .fab-install {
            position: fixed;
            bottom: 85px; /* Placé juste au-dessus de la barre de navigation */
            right: 20px;
            width: 48px;
            height: 48px;
            background: #d4af37; /* Ton Or */
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            z-index: 999;
            transition: transform 0.2s ease, opacity 0.3s ease;
        }

        .fab-install:active {
            transform: scale(0.9);
        }

        .fab-install i {
            font-size: 20px;
        }

        /* Tooltip discret au survol (optionnel) */
        .fab-install::after {
            content: "Installer l'app";
            position: absolute;
            right: 55px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        @media (hover: hover) {
            .fab-install:hover::after {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <a href="LIEN_DE_TON_APK" class="fab-install" id="install-fab" title="Installer l'application">
        <i class="fa-solid fa-download"></i>
    </a>

    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <i class="fa-solid fa-briefcase"></i>
                    <h1>Go <span>Buznes</span></h1>
                </div>
                <p id="total-articles-display">Initialisation...</p>
            </div>

            <div class="header-stats">
                <div class="stat-main">
                    <span id="count-total">0</span>
                    <small>Vendeurs</small>
                </div>
                <div class="stat-details">
                    <div class="stat-item gold" title="Badges Or">
                        <i class="fa-solid fa-crown"></i>
                        <span id="count-gold">0</span>
                    </div>
                    <div class="stat-item blue" title="Vérifiés">
                        <i class="fa-solid fa-circle-check"></i>
                        <span id="count-blue">0</span>
                    </div>
                    <div class="stat-item neutral" title="Boutiques standards">
                        <i class="fa-solid fa-shop"></i>
                        <span id="count-none">0</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="search-container">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="main-search" placeholder="Rechercher à Goma...">
            </div>
        </div>

        <main class="app-content" id="main-render"></main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-page="home">
                <i class="fa-solid fa-house"></i><span>Accueil</span>
            </a>
            <a href="#" class="nav-item" data-page="stores">
                <i class="fa-solid fa-store"></i><span>Boutiques</span>
            </a>
            <a href="#" class="nav-item" data-page="vendre">
                <i class="fa-solid fa-rocket"></i><span>Vendre</span>
            </a>
            <a href="#" class="nav-item" data-page="biens">
                <i class="fa-solid fa-boxes-stacked"></i><span>Biens</span>
            </a>
            <a href="#" class="nav-item" data-page="profil">
                <i class="fa-regular fa-user"></i><span>Profil</span>
            </a>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
    <script src="https://gogamenetiqui.github.io/serverapide/ads.js"></script>
    <script>
        // Masquer le bouton si l'utilisateur utilise déjà l'app installée (PWA/TWA)
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            const fab = document.getElementById('install-fab');
            if (fab) fab.style.display = 'none';
        }
    </script>
</body>

</html>
