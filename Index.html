<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Buznes</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;          /* Blanc pur du nouveau logo */
            --text-main: #000000;         /* Noir profond pour le texte principal */
            --text-muted: #5f6368;        /* Gris pour le sous-titre */
            --logo-blue: #0046ad;         /* Bleu Royal extrait du logo */
            --meta-gray: #8a8d91;         /* Gris signature technique */
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            color: var(--text-main);
        }

        .splash-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 24px;
        }

        .top-space {
            height: 40px;
        }

        /* LOGO CENTRAL (Inspiration Google & Nouveau Logo) */
        .brand-wrapper {
            text-align: center;
            opacity: 0;
            transform: scale(0.96);
            animation: appairageGoogle 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .brand-wrapper h1 {
            font-size: 36px;
            font-weight: 500;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .brand-wrapper h1 span {
            color: var(--logo-blue); /* Application du Bleu Royal */
            font-weight: 700;
        }

        .brand-wrapper p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* LOADER INFINI (Inspiration Google Material) */
        .loader-wrapper {
            width: 110px;
            height: 3px;
            background-color: #f1f3f4;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            margin-bottom: 50px;
        }

        .loader-line {
            position: absolute;
            background-color: var(--logo-blue);
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            animation: glissementLigne 1.4s ease-in-out infinite;
        }

        /* SIGNATURE TECHNIQUE NETIQUI (Style Meta Studio) */
        .footer-signature {
            text-align: center;
            opacity: 0;
            animation: appairageGoogle 0.5s ease forwards 0.3s;
        }

        .footer-signature .by {
            font-size: 10px;
            color: var(--meta-gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .footer-signature .studio-name {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ANIMATIONS */
        @keyframes appairageGoogle {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes glissementLigne {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0%); }
            100% { transform: translateX(100%); }
        }

        /* SORTIE FLUIDE */
        .page-exit {
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="splash-container" id="splash-view">

    <div class="top-space"></div>

    <div class="brand-wrapper">
        <h1>Go <span>Buznes</span></h1>
        <p>Le commerce connecté • Goma</p>
    </div>

    <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="loader-wrapper">
            <div class="loader-line"></div>
        </div>

        <div class="footer-signature">
            <div class="by">Produit par</div>
            <div class="studio-name">Netiqui</div>
        </div>
    </div>

</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Durée de 3 secondes d'affichage visuel pur avant redirection mécanique
        setTimeout(() => {
            const view = document.getElementById('splash-view');
            if (view) {
                view.classList.add('page-exit');
            }

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 350);

        }, 3000);
    });
</script>
</body>
  </html>
